<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DooPloen - Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Logo Animation */
    .logo-wrapper {
      position: relative;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo-text {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 2px;
      text-align: center;
      background: linear-gradient(135deg, #ffffff 0%, #ffffff 50%, #d4af37 50%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .logo-text .doo {
      display: inline-block;
      color: white;
    }

    .logo-text .ploen {
      display: inline-block;
      background: linear-gradient(135deg, #d4af37 0%, #ffeb3b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Play Button with Glow */
    .play-button-wrapper {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }

    .play-button {
      width: 80px;
      height: 80px;
      background: #e63946;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(230, 57, 70, 0.6);
      animation: pulse 2s ease-in-out infinite, float 3s ease-in-out infinite;
      transition: transform 0.3s ease;
    }

    .play-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(230, 57, 70, 0.8);
    }

    .play-button::after {
      content: "▶";
      color: white;
      font-size: 32px;
      margin-left: 4px;
    }

    /* Loading Spinner */
    .spinner-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin-top: 30px;
      margin-bottom: 40px;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e63946;
      border-right-color: #d4af37;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
      box-shadow: 0 0 20px rgba(230, 57, 70, 0.3);
    }

    .spinner::before {
      content: '';
      position: absolute;
      width: 80%;
      height: 80%;
      top: 10%;
      left: 10%;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #ffeb3b;
      border-radius: 50%;
      animation: spinReverse 2.5s linear infinite;
    }

    /* Loading Text */
    .loading-text {
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 3px;
      animation: pulse-text 1.5s ease-in-out infinite;
    }

    .loading-text span {
      display: inline-block;
      animation: bounce 1.5s ease-in-out infinite;
    }

    .loading-text span:nth-child(1) { animation-delay: 0s; }
    .loading-text span:nth-child(2) { animation-delay: 0.2s; }
    .loading-text span:nth-child(3) { animation-delay: 0.4s; }

    /* Progress Bar */
    .progress-container {
      width: 250px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin-top: 30px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(230, 57, 70, 0.2);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e63946 0%, #d4af37 100%);
      width: 0%;
      animation: progress 3s ease-in-out infinite;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(230, 57, 70, 0.6);
    }

    /* Animations */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes progress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Background Animation */
    .background-animation {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.05;
    }

    .circle1 {
      width: 300px;
      height: 300px;
      background: #e63946;
      top: -50px;
      right: -50px;
      animation: float 6s ease-in-out infinite;
    }

    .circle2 {
      width: 200px;
      height: 200px;
      background: #d4af37;
      bottom: -30px;
      left: -30px;
      animation: float 8s ease-in-out infinite reverse;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .logo-text {
        font-size: 36px;
      }

      .play-button {
        width: 60px;
        height: 60px;
      }

      .play-button::after {
        font-size: 24px;
      }

      .spinner-wrapper {
        width: 80px;
        height: 80px;
      }

      .spinner {
        border-width: 3px;
      }

      .progress-container {
        width: 200px;
      }

      .loading-text {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="background-animation">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
  </div>

  <div class="loading-container">
    <div class="logo-wrapper">
      <div class="play-button-wrapper">
        <div class="play-button"></div>
      </div>
      <div class="logo-text">
        <span class="doo">Doo</span><span class="ploen">Ploen</span>
      </div>
    </div>

    <div class="spinner-wrapper">
      <div class="spinner"></div>
    </div>

    <div class="loading-text">
      <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
    </div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  </div>

  <script>
    // Optional: Close loading after 5 seconds and redirect
    setTimeout(() => {
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.5s ease-out';
      setTimeout(() => {
        window.location.href = '/'; // Redirect to home page
      }, 500);
    }, 5000);

    // Optional: Add click to skip loading
    document.addEventListener('click', () => {
      window.location.href = '/';
    });
  </script>
</body>
</html>

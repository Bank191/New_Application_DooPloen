<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Video Player</title>
    <style>
        /* เพิ่ม CSS ตกแต่งตามใจชอบ */
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .player-container { max-width: 1000px; margin: auto; padding: 20px; }
        #videoPlayer { background: #333; width: 100%; aspect-ratio: 16/9; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="player-container">
        <div id="videoPlayer">
            <p>Video Player Space (YouTube/File)</p>
        </div> 
        
        <h1 id="movieTitle">กำลังโหลด...</h1>
        <p id="movieDescription"></p>
        <div class="movie-meta">
            <span id="releaseYear"></span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        if (movieId) {
           fetch(`/api/movie-detail/${movieId}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById('movieTitle').innerText = data.title;
        document.getElementById('movieDescription').innerText = data.description;
        
                if (data.video_url) {
                    // ฟังก์ชันสำหรับแปลงลิงก์ YouTube ทั่วไปให้เป็นแบบ Embed
                    let videoId = "";
                    if (data.video_url.includes('v=')) {
                        videoId = data.video_url.split('v=')[1].split('&')[0];
                    } else if (data.video_url.includes('youtu.be/')) {
                        videoId = data.video_url.split('youtu.be/')[1];
                    }

                    if (videoId) {
                        // สร้าง iframe สำหรับเล่นวิดีโอ
                        document.getElementById('videoPlayer').innerHTML = `
                            <iframe width="100%" height="100%" 
                                    src="https://www.youtube.com/embed/${videoId}" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>`;
                    }
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ใครกำลังรับชมอยู่?</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background-color: #141414; color: white; text-align: center; font-family: sans-serif; }
        .profile-list { display: flex; gap: 20px; justify-content: center; margin-top: 50px; flex-wrap: wrap; }
        .profile-item { cursor: pointer; text-align: center; width: 150px; }
        .profile-avatar { width: 150px; height: 150px; border-radius: 4px; border: 3px solid transparent; transition: 0.3s; }
        .profile-avatar:hover { border-color: white; transform: scale(1.05); }
        button { 
            padding: 10px 20px; 
            background: transparent; 
            color: gray; 
            border: 1px solid gray; 
            cursor: pointer; 
            font-size: 16px; 
        }
        button:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <h1 style="margin-top: 100px;">ใครกำลังรับชมอยู่?</h1>
    
    <div id="profile-display" class="profile-list">
        </div>

    <div style="margin-top: 50px;">
        <button onclick="createNewProfile()">เพิ่มโปรไฟล์ใหม่</button>
    </div>

    <script>
    const storedUser = JSON.parse(localStorage.getItem('user'));

    if (!storedUser) {
        window.location.href = 'login.html';
    }

    // --- ฟังก์ชันดึงข้อมูลมาโชว์ ---
    async function loadProfiles() {
        const display = document.getElementById('profile-display');
        display.innerHTML = "";
        try {
            const userId = storedUser.user_id; 
            const res = await fetch(`http://localhost:3000/api/profiles/${userId}`);
            const data = await res.json();
            
            const display = document.getElementById('profile-display');

            // แก้ตรงนี้: เช็ค data.profiles ตามที่หลังบ้านส่งมา
            if (data.success && data.profiles.length > 0) {
                display.innerHTML = data.profiles.map(p => `
                    <div class="profile-item" onclick="chooseProfile(${p.profile_id}, '${p.name}')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" class="profile-avatar">
                        <p style="color: white; margin-top: 10px; font-size: 18px;">${p.name}</p>
                    </div>
                `).join('');
            } else {
                display.innerHTML = '<p style="color: gray;">ยังไม่มีโปรไฟล์ กรุณาเพิ่มโปรไฟล์ใหม่</p>';
            }
        } catch (error) {
            console.error("❌ Error loading profiles:", error);
            document.getElementById('profile-display').innerHTML = '<p style="color: red;">โหลดข้อมูลผิดพลาด</p>';
        }
    }

    // --- ฟังก์ชันสร้างโปรไฟล์ใหม่ (หน้าบ้านต้องเป็นแบบนี้!) ---
   async function createNewProfile() {
    const name = prompt("กรุณาใส่ชื่อโปรไฟล์ใหม่:");
    if (!name) return;

    // 🔍 เช็คก่อนว่ามึงมี ID ผู้ใช้จริงไหม
    if (!storedUser || !storedUser.user_id) {
        alert("มึงยังไม่ได้ Login หรือข้อมูล User หาย! ลอง Login ใหม่ดู");
        return;
    }

    console.log("📤 กำลังส่งข้อมูล:", { user_id: storedUser.user_id, name: name });

    try {
        const response = await fetch('http://localhost:3000/api/profiles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: storedUser.user_id,
                name: name
            })
        });

        // 🔍 เช็คว่า HTTP Status เป็น 200-299 ไหม
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Server error: ${response.status}`);
        }

        const data = await response.json();

        if (data.success) {
            alert("ยินดีด้วยมึง! สร้างโปรไฟล์สำเร็จ");
            loadProfiles(); // ดึงข้อมูลใหม่จาก DB มาโชว์
        } else {
            alert("พลาดแล้วมึง: " + (data.message || "Unknown error"));
        }
    } catch (error) {
        console.error("❌ Fetch Error:", error);
        alert("ติดต่อเซิร์ฟเวอร์ไม่ได้ หรือ SQL พัง: " + error.message);
    }
}

    function chooseProfile(id, name) {
        localStorage.setItem('current_profile_id', id);   
        localStorage.setItem('current_profile_name', name); 
        window.location.href = 'home.html'; 
    }

    loadProfiles();
</script>
    
</body>
</html>

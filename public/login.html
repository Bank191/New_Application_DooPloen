<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>DooPloen - Login</title>
    <style>
        body { background: #141414; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .login-box { background: rgba(0,0,0,0.75); padding: 40px; border-radius: 10px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #e50914; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>เข้าสู่ระบบ</h2>
        <input type="email" id="email" placeholder="อีเมล">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button onclick="login()">เข้าสู่ระบบ</button>
        <p id="msg"></p>
    </div>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (data.success) {
                // ✅ บันทึกข้อมูล user ลงเครื่อง (ใช้ชื่อ "user" เป็นมาตรฐาน)
                localStorage.setItem("user", JSON.stringify(data.user)); 
                
                alert('ยินดีต้อนรับคุณ ' + data.user.firstname);
                window.location.href = 'home.html'; 
            } else {
                document.getElementById('msg').innerText = data.message;
                document.getElementById('msg').style.color = "red";
            }
        } catch (error) {
            console.error("Login Error:", error);
        }
    }
</script>
</body>
</html>

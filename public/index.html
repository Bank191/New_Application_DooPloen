<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DooPloen - Home</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #141414;
      color: white;
      margin: 0;
      padding: 0;
    }

    .header {
      padding: 20px 50px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
    }

    .movie-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
      padding: 20px 50px;
    }

    .movie-card {
      background: #2f2f2f;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: scale(1.05);
    }

    .movie-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .movie-info { padding: 12px; background: #181818; }
    .movie-info h3 { font-size: 14px; margin: 0; color: #fff; }

    /* ตกแต่งรายการตอน */
    .episode-item {
      background: #262626;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border: 1px solid #333;
    }
    .episode-item:hover { background: #333; }

    button {
      background-color: #e50914;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="video-player-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
    <button onclick="closePlayer()" style="position: absolute; top: 20px; right: 20px; background: none; font-size: 30px; color: white; cursor: pointer;">✕</button>
    
    <div id="player-container" style="width: 80%; max-width: 900px; aspect-ratio: 16/9; background: #000; display: flex; justify-content: center; align-items: center; border: 2px solid #333;">
        <p id="player-status" style="color: #e50914; font-size: 1.5rem;">กำลังเตรียมการสตรีม...</p>
    </div>
    
    <h2 id="playing-title" style="margin-top: 20px; color: white;"></h2>
</div>

  <div class="header">
    <h1 style="color: #e50914; margin: 0;">Doo<span>Ploen</span></h1>
    <p>สตรีมมิ่งความสุขได้ทุกที่</p>
  </div>

  <div class="movie-container" id="movie-grid"></div>

  <div id="episode-section" style="display: none; padding: 20px 50px; background: #1a1a1a; margin: 20px 0; border-top: 2px solid #e50914;">
    <h2 id="display-title" style="color: white; margin-bottom: 5px;">ชื่อหนัง</h2>
    <p id="display-desc" style="color: #aaa; margin-bottom: 20px; font-size: 14px;">เรื่องย่อ...</p>
    
    <h3 style="color: #e50914; font-size: 18px; margin-bottom: 15px;">เลือกตอนรับชม</h3>
    <div id="episode-list"></div>
  </div>

  <hr style="border: 0.5px solid #333; margin: 50px 0;">

  <div class="box" style="background: #222; padding: 30px; border-radius: 10px; width: 320px; margin: 40px auto; text-align: center; border: 1px solid #444;">
    <h3 style="margin-top: 0; color: white;">Register New User</h3>
    <input id="firstname" placeholder="First Name" style="background: #333; color: white; border: 1px solid #555; margin-bottom: 10px; padding: 10px; width: 90%;">
    <input id="lastname" placeholder="Last Name" style="background: #333; color: white; border: 1px solid #555; margin-bottom: 10px; padding: 10px; width: 90%;">
    <input id="email" type="email" placeholder="Email Address" style="background: #333; color: white; border: 1px solid #555; margin-bottom: 10px; padding: 10px; width: 90%;">
    <input id="password" type="password" placeholder="Password" style="background: #333; color: white; border: 1px solid #555; margin-bottom: 15px; padding: 10px; width: 90%;">
    <button id="saveBtn" onclick="insertUser()" disabled style="width: 100%;">Create Account</button>
  </div>

  <script>
    // โหลดหนังหน้าแรก
    async function loadMovies() {
      const res = await fetch('/api/movies');
      const data = await res.json();
      if (data.success) {
        document.getElementById('movie-grid').innerHTML = data.movies.map(m => `
          <div class="movie-card" onclick="openMovieDetail(${m.content_id})">
            <img src="${m.poster_path}" alt="${m.title}">
            <div class="movie-info"><h3>${m.title}</h3></div>
          </div>
        `).join('');
      }
    }

    // เมื่อคลิกเลือกหนัง
    async function openMovieDetail(contentId) {
      const res = await fetch(`/api/movie-detail/${contentId}`);
      const data = await res.json();
      
      if (data.success) {
        const m = data.movie;
        // แสดงชื่อเรื่องและเรื่องย่อใน Section
        document.getElementById('display-title').innerText = m.title;
        document.getElementById('display-desc').innerText = m.description || "ไม่มีรายละเอียดเรื่องย่อ";
        
        // เปิด Section และเลื่อนหน้าจอ
        const section = document.getElementById('episode-section');
        section.style.display = "block";
        section.scrollIntoView({ behavior: 'smooth' });

        // ดึงรายชื่อตอนมาแสดง
        showEpisodeList(contentId);
      }
    }

    // ดึงรายชื่อตอนจาก Database
    async function showEpisodeList(contentId) {
    const res = await fetch(`/api/episodes/${contentId}`);
    const data = await res.json();
    const list = document.getElementById('episode-list');
    
      if (data.success && data.episodes.length > 0) {
          list.innerHTML = data.episodes.map(ep => `
              <div class="episode-item" onclick="playTrailer('${ep.trailer_key}', '${ep.title}')">
                  <span><b>ตอนที่ ${ep.episode_number}:</b> ${ep.title}</span>
                  <span style="color: #e50914; font-weight: bold;">▶ เล่น</span>
              </div>
          `).join('');
      } else {
          list.innerHTML = "<p style='color: #666;'>ยังไม่มีตอนย่อยในขณะนี้</p>";
      }
  }

    function insertUser() {
        const firstname = document.getElementById("firstname").value;
        const lastname = document.getElementById("lastname").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ firstname, lastname, email, password })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message || "สมัครสมาชิกเรียบร้อย");
            location.reload();
        });
    }

    document.addEventListener("input", function() {
      const f = document.getElementById("firstname").value;
      const l = document.getElementById("lastname").value;
      document.getElementById("saveBtn").disabled = !(f && l);
    });

    window.onload = loadMovies;
  </script>
</body>
</html>
